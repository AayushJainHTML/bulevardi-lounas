name: Update lunch menus

on:
  schedule:
    # Every weekday at 09:30 Helsinki time (06:30 UTC summer / 07:30 UTC winter)
    # Cron uses UTC. We run twice to cover both, idempotent so the second is cheap.
    - cron: "30 6 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "30 9 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch: # lets you trigger manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit menus.json if changed
        run: |
          git config user.name "lunch-bot"
          git config user.email "lunch-bot@users.noreply.github.com"
          git add menus.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update menus $(date -u +%Y-%m-%d)"
            git push
          fi
